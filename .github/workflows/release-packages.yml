name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm install
      - run: npm run check
      - run: python3 scripts/package_releases.py
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-release-packages
          path: dist/releases
